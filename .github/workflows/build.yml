name: Build LMCache Bundle

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:buster
      options: --user root
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build deps
        run: |
          apt-get update
          apt-get install -y cmake build-essential git wget ca-certificates python3-dev python3-pip

      - name: Build LMCache Daemon
        run: |
          git clone --depth=1 https://github.com/LMCache/LMCache.git /tmp/LMCache
          cd /tmp/LMCache && git submodule update --init --recursive
          cd cpp && mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release -DLMCACHE_BUILD_SERVER=ON ..
          make -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifact/bin
          cp bin/lmcache_server $GITHUB_WORKSPACE/artifact/bin/

      - name: Build llama.cpp with LMCache
        run: |
          git clone --depth=1 https://github.com/ggerganov/llama.cpp.git /tmp/llama.cpp
          cd /tmp/llama.cpp
          cmake -B build -DLMCACHE=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build build --config Release -j$(nproc)
          mkdir -p $GITHUB_WORKSPACE/artifact/bin
          cp build/bin/llama-server $GITHUB_WORKSPACE/artifact/bin/

      - name: Generate configs & scripts
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifact/{config,systemd,scripts}

          cat > $GITHUB_WORKSPACE/artifact/config/lmcache-128gb-1.yaml <<'EOF'
lmcache:
  chunk_size: 512
  local_cpu: true
  local_cpu_size: "64GB"
  local_disk: true
  local_disk_path: "/mnt/lmcache_disk"
  local_disk_size: "100GB"
  cluster:
    enabled: true
    node_id: "128gb-1"
    peers: ["134.200.18.7:6500", "134.200.18.8:6500", "134.200.58.99:6500"]
    port: 6500
EOF

          cat > $GITHUB_WORKSPACE/artifact/config/lmcache-128gb-2.yaml <<'EOF'
lmcache:
  chunk_size: 512
  local_cpu: true
  local_cpu_size: "64GB"
  local_disk: true
  local_disk_path: "/mnt/lmcache_disk"
  local_disk_size: "100GB"
  cluster:
    enabled: true
    node_id: "128gb-2"
    peers: ["134.200.18.7:6500", "134.200.18.8:6500", "134.200.58.99:6500"]
    port: 6500
EOF

          cat > $GITHUB_WORKSPACE/artifact/config/lmcache-3090.yaml <<'EOF'
lmcache:
  chunk_size: 512
  local_cpu: true
  local_cpu_size: "8GB"
  local_disk: true
  local_disk_path: "/mnt/lmcache_disk"
  local_disk_size: "20GB"
  cluster:
    enabled: true
    node_id: "3090"
    peers: ["134.200.18.7:6500", "134.200.18.8:6500", "134.200.58.99:6500"]
    port: 6500
EOF

          cat > $GITHUB_WORKSPACE/artifact/systemd/lmcache.service <<'EOF'
[Unit]
Description=LMCache Daemon
After=network.target
[Service]
Type=simple
ExecStart=/usr/local/bin/lmcache_server --config /etc/lmcache/config.yaml
Restart=on-failure
RestartSec=5
LimitMEMLOCK=infinity
[Install]
WantedBy=multi-user.target
EOF

          cat > $GITHUB_WORKSPACE/artifact/scripts/deploy-128gb.sh <<'DEPLOY128'
#!/usr/bin/env bash
set -euo pipefail
NODE_ID="${1:-128gb-1}"
echo "=== 部署 128GB 节点: $NODE_ID ==="

sudo cp /opt/lmcache-bundle/bin/lmcache_server /usr/local/bin/
sudo chmod +x /usr/local/bin/lmcache_server

sudo mkdir -p /etc/lmcache /var/lib/lmcache /mnt/lmcache_disk
sudo chown -R $(whoami):$(whoami) /var/lib/lmcache /mnt/lmcache_disk

case "$NODE_ID" in
  128gb-1) sudo cp /opt/lmcache-bundle/config/lmcache-128gb-1.yaml /etc/lmcache/config.yaml ;;
  128gb-2) sudo cp /opt/lmcache-bundle/config/lmcache-128gb-2.yaml /etc/lmcache/config.yaml ;;
esac
sudo cp /opt/lmcache-bundle/systemd/lmcache.service /etc/systemd/system/

sudo systemctl daemon-reload
sudo systemctl enable --now lmcache

echo "=== $NODE_ID 部署完成 ==="
echo "状态: systemctl status lmcache"
DEPLOY128
          chmod +x $GITHUB_WORKSPACE/artifact/scripts/deploy-128gb.sh

          cat > $GITHUB_WORKSPACE/artifact/scripts/deploy-3090.sh <<'DEPLOY3090'
#!/usr/bin/env bash
set -euo pipefail
echo "=== 部署 3090: llama-server + LMCache ==="

sudo cp /opt/lmcache-bundle/bin/lmcache_server /usr/local/bin/
sudo chmod +x /usr/local/bin/lmcache_server
sudo cp /opt/lmcache-bundle/bin/llama-server /home/cuaibox/zhuhui/llamacpp/build/bin/
sudo chown cuaibox:cuaibox /home/cuaibox/zhuhui/llamacpp/build/bin/llama-server

sudo mkdir -p /etc/lmcache /var/lib/lmcache /mnt/lmcache_disk

sudo cp /opt/lmcache-bundle/config/lmcache-3090.yaml /etc/lmcache/config.yaml
sudo cp /opt/lmcache-bundle/systemd/lmcache.service /etc/systemd/system/

cat > /home/cuaibox/zhuhui/llamacpp/llama.cpp/start_server.sh <<'START'
#!/usr/bin/env bash
./build/bin/llama-server \
  -m /home/cuaibox/zhuhui/llamacpp/llama_space/models/Qwen_Qwen3.6-35B-A3B-Q4_K_M.gguf \
  -ngl 41 \
  --alias "My-QwenGlm-35B" \
  --ctx-size 262144 \
  --host 0.0.0.0 \
  --port 18686 \
  --chat-template chatml \
  --rpc 134.200.18.7:6500,134.200.18.8:6500 \
  -np 4 \
  >> /home/cuaibox/zhuhui/llamacpp/llama.cpp/server.log 2>&1
START
chmod +x /home/cuaibox/zhuhui/llamacpp/llama.cpp/start_server.sh

sudo systemctl daemon-reload
sudo systemctl enable --now lmcache

echo "=== 3090 部署完成 ==="
echo "启动 llama-server: cd /home/cuaibox/zhuhui/llamacpp/llama.cpp && bash start_server.sh"
DEPLOY3090
          chmod +x $GITHUB_WORKSPACE/artifact/scripts/deploy-3090.sh

          cat > $GITHUB_WORKSPACE/artifact/scripts/verify.sh <<'VERIFY'
#!/usr/bin/env bash
echo "=== 集群验证 ==="
echo "--- 128GB #1 (134.200.18.7) ---"
curl -sf http://134.200.18.7:6500/health && echo " OK" || echo " FAIL"
echo "--- 128GB #2 (134.200.18.8) ---"
curl -sf http://134.200.18.8:6500/health && echo " OK" || echo " FAIL"
echo "--- 3090 llama-server ---"
curl -sf http://134.200.58.99:18686/v1/models && echo "" || echo " FAIL"
echo "--- 测试并发 ---"
for i in 1 2 3 4; do
  curl -s -X POST http://134.200.58.99:18686/v1/chat/completions \
    -H "Content-Type: application/json" \
    -d "{\"model\":\"My-QwenGlm-35B\",\"messages\":[{\"role\":\"user\",\"content\":\"测试用户$i\"}],\"max_tokens\":20}" &
done
wait
echo ""
echo "=== 验证完成 ==="
VERIFY
          chmod +x $GITHUB_WORKSPACE/artifact/scripts/verify.sh

      - name: Package
        run: |
          cd $GITHUB_WORKSPACE
          tar -czf lmcache-bundle.tar.gz -C artifact .
          ls -lh lmcache-bundle.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: lmcache-bundle
          path: $GITHUB_WORKSPACE/lmcache-bundle.tar.gz
          retention-days: 7
