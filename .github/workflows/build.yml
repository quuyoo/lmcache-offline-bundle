name: Build llama.cpp CPU (for 128GB RPC workers)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:buster
    steps:
      - uses: actions/checkout@v4

      - name: Fix apt sources (buster EOL)
        run: |
          sed -i 's/deb.debian.org/archive.debian.org/g' /etc/apt/sources.list
          sed -i 's/security.debian.org/archive.debian.org/g' /etc/apt/sources.list
          sed -i 's/buster\/updates/buster/g' /etc/apt/sources.list
          apt-get update

      - name: Install build dependencies
        run: |
          apt-get install -y --no-install-recommends \
            build-essential cmake curl wget ca-certificates pkg-config

      - name: Build CPU-only llama-server
        run: |
          cd /tmp
          curl -sL https://github.com/ggml-org/llama.cpp/archive/refs/heads/master.tar.gz -o llama-cpp.tar.gz
          tar xzf llama-cpp.tar.gz
          mv llama.cpp-master llama.cpp
          cd llama.cpp
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build . --config Release -j$(nproc)
          mkdir -p /opt/bundle/llama-cpp-server
          cp bin/llama-server /opt/bundle/llama-cpp-server/
          echo "=== Build done ==="

      - name: Package bundle
        run: |
          rm -rf /tmp/llama.cpp /tmp/llama-cpp.tar.gz
          date +"%Y-%m-%d %H:%M:%S" > /opt/bundle/VERSION
          cd /opt
          tar czf /tmp/llama-rpc-worker.tar.gz bundle/
          ls -lh /tmp/llama-rpc-worker.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: llama-rpc-worker
          path: /tmp/llama-rpc-worker.tar.gz
          retention-days: 30
